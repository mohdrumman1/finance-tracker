name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, auth-implemented]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-not-used-in-prod
          BCRYPT_SALT_ROUNDS: '10'

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci-test-secret-not-used-in-prod
          BCRYPT_SALT_ROUNDS: '10'
